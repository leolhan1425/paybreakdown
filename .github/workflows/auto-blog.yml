name: Auto Blog Post

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday 9am ET (14:00 UTC)
  workflow_dispatch: {}     # Manual trigger from GitHub UI

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash scripts/generate-blog.sh

      - name: Commit new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/ scripts/blog-topics.txt
          if git diff --cached --quiet; then
            echo "No new content to commit"
            exit 0
          fi
          SLUG=$(git diff --cached --name-only | grep content/blog | head -1 | sed 's|content/blog/||;s|\.md||')
          git commit -m "blog: add $SLUG

          Auto-generated by GitHub Actions"
          git push

      - name: Build site
        run: npm run build

      - name: Deploy to VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 89.167.19.159 >> ~/.ssh/known_hosts 2>/dev/null

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            out/ root@89.167.19.159:/opt/paybreakdown/out/

          ssh -i ~/.ssh/deploy_key root@89.167.19.159 \
            "chown -R bctracker:bctracker /opt/paybreakdown"

          rm -f ~/.ssh/deploy_key
